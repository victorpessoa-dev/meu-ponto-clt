name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
      RESEND_API_KEY: "re_ci_dummy_key"
      EMAIL_FROM: "Meu Ponto CLT | Virtus Soft <no-reply@virtussoft.com.br>"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
